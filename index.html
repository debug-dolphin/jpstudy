<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>일본어 학습기 Firebase 버전</title>

<style>
body { font-family:sans-serif; text-align:center; margin-top:40px; }
button { margin:5px; padding:10px; }
#answer { display:none; font-size:24px; margin-top:20px; }
#question { font-size:28px; margin-top:20px; }
.box { border:1px solid #ddd; margin:10px; padding:10px; }
</style>
</head>

<body>

<h2 id="modeLabel">기본학습</h2>
<h2 id="question">로딩중...</h2>
<div id="answer"></div>

<button onclick="showAnswer()">답 보기</button>

<br><br>

<button onclick="setMode('normal')">기본학습</button>
<button onclick="setMode('graduated')">졸업학습</button>
<button onclick="setMode('wrong')">오답학습</button>

<br><br>

<button onclick="setBatch(1)">1문제</button>
<button onclick="setBatch(5)">5문제</button>
<button onclick="setBatch(10)">10문제</button>

<br><br>

<button onclick="markCorrect()">맞음</button>
<button onclick="markWrong()">틀림</button>

<br><br>

<button onclick="finishBatch()">세트 종료 + 리뷰</button>

<div id="status"></div>

<!-- Firebase (script 방식) -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

// =====================
// Firebase 설정
// =====================
const firebaseConfig = {
  apiKey: "AIzaSyBM50z8TDCv9uHXqx4xd-lC8wAQph9qqpE",
  authDomain: "jp-writing-73c3d.firebaseapp.com",
  projectId: "jp-writing-73c3d",
  storageBucket: "jp-writing-73c3d.firebasestorage.app",
  messagingSenderId: "285988750638",
  appId: "1:285988750638:web:87a6b3dc6279919a82e6bf"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// =====================
// 상태
// =====================
let sentences = [];
let wrongList = [];

let batch = [];
let results = [];
let index = 0;

let mode = "normal";
let batchSize = 5;
let current = null;

// =====================
// 데이터 로드
// =====================
async function loadData(){

  let snap = await db.collection("sentences").get();
  sentences = snap.docs.map(d => ({ id:d.id, ...d.data() }));

  let wsnap = await db.collection("wrongList").get();
  wrongList = wsnap.docs.map(d => ({ id:d.id, ...d.data() }));

  startBatch();
}

// =====================
// 배치 생성
// =====================
function startBatch(){

  let pool = [];

  if(mode==="normal"){
    pool = sentences.filter(x=>x.group<=5);
  } else if(mode==="graduated"){
    pool = sentences.filter(x=>x.group===6);
  } else {
    pool = wrongList;
  }

  batch = shuffle(pool).slice(0,batchSize);

  index = 0;
  results = [];

  loadQuestion();
}

// =====================
// 문제 출력
// =====================
function loadQuestion(){

  if(index >= batch.length){
    document.getElementById("question").innerText = "세트 완료";
    return;
  }

  current = batch[index];

  document.getElementById("question").innerText = current.korean;
  document.getElementById("answer").innerText = current.japanese;
  document.getElementById("answer").style.display = "none";

  document.getElementById("status").innerText =
    `${index+1} / ${batch.length}`;
}

// =====================
// 답 보기
// =====================
function showAnswer(){
  document.getElementById("answer").style.display = "block";
}

// =====================
// 기록만 (즉시 채점 X)
// =====================
function markCorrect(){
  results[index] = true;
  next();
}

function markWrong(){
  results[index] = false;
  next();
}

function next(){
  index++;
  loadQuestion();
}

// =====================
// 세트 종료 → 리뷰
// =====================
async function finishBatch(){

  // 그룹 업데이트 + 오답 저장
  for(let i=0;i<batch.length;i++){

    let item = batch[i];

    if(results[i]){

      item.group = Math.min(item.group+1,6);

      await db.collection("sentences")
        .doc(item.id)
        .update({ group:item.group });

      await db.collection("wrongList")
        .doc(item.id)
        .delete()
        .catch(()=>{});

    } else {

      item.group = 1;

      await db.collection("sentences")
        .doc(item.id)
        .update({ group:1 });

      await db.collection("wrongList")
        .doc(item.id)
        .set(item);
    }
  }

  renderReview();
}

// =====================
// 리뷰 화면
// =====================
function renderReview(){

  let html = "<h2>리뷰</h2>";

  batch.forEach((item,i)=>{

    html += `
      <div class="box">
        <div>Q: ${item.korean}</div>
        <div>A: ${item.japanese}</div>
        <div>${results[i] ? "⭕ 정답" : "❌ 오답"}</div>
      </div>
    `;
  });

  document.body.innerHTML = html;
}

// =====================
// 설정
// =====================
function setMode(m){

  mode = m;

  document.getElementById("modeLabel").innerText =
    m==="normal" ? "기본학습" :
    m==="graduated" ? "졸업학습" :
    "오답학습";

  startBatch();
}

function setBatch(n){
  batchSize = n;
  startBatch();
}

// =====================
// shuffle
// =====================
function shuffle(arr){
  return [...arr].sort(()=>Math.random()-0.5);
}

// 시작
loadData();

</script>

</body>
</html>
