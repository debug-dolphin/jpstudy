<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>일본어 그룹 학습기</title>

<style>
body{
font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
text-align:center;
margin-top:30px;
font-size:22px;
}

button{
margin:5px;
padding:12px;
font-size:18px;
}

.box{
border:1px solid #ddd;
margin:10px;
padding:15px;
}

.small{
font-size:18px;
color:#666;
}

textarea{
width:80%;
height:120px;
font-size:18px;
}
</style>

</head>


<body>

<h2>그룹 학습</h2>

<div id="stats" class="small">
로딩중...
</div>

<div id="app">
로딩중...
</div>


<h3>그룹 선택</h3>

<button onclick="setGroup(1)">1그룹</button>
<button onclick="setGroup(2)">2그룹</button>
<button onclick="setGroup(3)">3그룹</button>
<button onclick="setGroup(4)">4그룹</button>
<button onclick="setGroup(5)">5그룹</button>
<button onclick="setGroup(6)">6그룹</button>


<br><br>

<button onclick="setBatch(1)">1문장</button>
<button onclick="setBatch(5)">5문제</button>
<button onclick="setBatch(10)">10문제</button>


<h3>문장 추가</h3>

<textarea id="inputBox"
placeholder="한국어 TAB 일본어"></textarea>

<br>

<button onclick="addSentences()">
저장
</button>



<script>


// =====================
// GAS 주소
// =====================

const API_URL = "https://script.google.com/macros/s/AKfycbwocOKmIMXR-57SYItybDZl0bY4V9LI1FZCxXNcX2Uqj5aggFFj2KQtU5KojvohixnGfg/exec";


// =====================
// 상태
// =====================

let sentences=[];

let batch=[];

let results=[];

let batchSize=5;

let selectedGroup=1;



// =====================
// 데이터 로드
// =====================

async function loadData(){

  const res = await fetch(API_URL + "?action=load");

  const data = await res.json();

  console.log("받은 데이터:", data);

  sentences = data;

  console.log("문장 수:", sentences.length);

  updateStats();

  startBatch();
}




// =====================
// 통계
// =====================

function updateStats(){

let html=
`
전체:${sentences.length}개 |

`;

for(let i=1;i<=6;i++){

html+=
`${i}그룹:${sentences.filter(x=>Number(x.group)===i).length} | `;

}

document.getElementById("stats").innerHTML=html;

}




// =====================
// 그룹
// =====================

function setGroup(g){

selectedGroup=g;

startBatch();

}




// =====================
// 문제 생성
// =====================

function startBatch(){

let pool=
sentences.filter(
x=>Number(x.group)===selectedGroup
);


batch=
shuffle(pool).slice(0,batchSize);


results=
new Array(batch.length).fill(null);


renderQuestions();

}





function renderQuestions(){

let html=
`<h2>${selectedGroup}그룹 문제</h2>`;


batch.forEach((x,i)=>{

html+=
`
<div class="box">
Q${i+1}. ${x.korean}
</div>
`;

});


html+=
`
<button onclick="renderAnswers()">
답 보기
</button>
`;


document.getElementById("app").innerHTML=html;

}





// =====================
// 답
// =====================

function renderAnswers(){

let html="<h2>답</h2>";


batch.forEach((x,i)=>{


html+=
`
<div class="box">

${x.korean}<br>

정답 :
${x.japanese}

<br><br>

<button onclick="mark(${i},true)">
⭕
</button>


<button onclick="mark(${i},false)">
❌
</button>


<span id="m${i}"></span>

</div>
`;

});


html+=
`
<button onclick="finishBatch()">
세트 종료
</button>
`;



document.getElementById("app").innerHTML=html;


}




function mark(i,v){

results[i]=v;

document.getElementById("m"+i).innerHTML=
v?"⭕":"❌";

}




// =====================
// 결과 저장
// =====================

async function finishBatch(){

  for(let i=0;i<batch.length;i++){

    let item=batch[i];

    let newGroup = item.group;

    if(results[i]){
      newGroup = Math.min(item.group + 1, 6);
    } else {
      newGroup = 1;
    }

    await fetch(
      API_URL +
      `?action=update&id=${item.id}&group=${newGroup}`
    );

  }

  await loadData();

}


}



await loadData();


}




// =====================
// 추가
// =====================

async function addSentences(){

let text=
document.getElementById("inputBox").value;


let lines=text.split("\n");


for(let line of lines){


let p=line.split("\t");


if(p.length<2) continue;



await fetch(API_URL + "?action=load",{

method:"POST",

body:JSON.stringify({

action:"add",

korean:p[0],

japanese:p[1]

})

});


}



document.getElementById("inputBox").value="";


loadData();

}





// =====================
// 설정
// =====================

function setBatch(n){

batchSize=n;

startBatch();

}




function shuffle(arr){

return [...arr]
.sort(()=>Math.random()-0.5);

}



// 시작

loadData();


</script>


</body>
</html>
